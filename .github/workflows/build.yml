name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y g++ make
    
    - name: Build
      run: make
    
    - name: Run tests
      run: make test
    
    - name: Verify output
      run: |
        ls -la chunk/
        echo "Test completed successfully!"
